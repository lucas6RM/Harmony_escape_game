<div class="game-shell" role="main" aria-label="Jeu en cours">
  <!-- Indicateur de Pièces -->
  <div class="coins-display" role="status" aria-live="polite" aria-label="Pièces accumulées">
    <span class="coins-icon" aria-hidden="true">🪙</span>
    <span class="coins-count">{{ coins() }}</span>
  </div>

  <!-- Indicateur de chargement pendant le chargement du Chemin -->
  @if (loading()) {
  <div class="loading-state" role="status" aria-label="Chargement du Chemin en cours">
    <span class="loading-spinner" aria-hidden="true">✨</span>
    <p>Chargement du Chemin...</p>
  </div>
  }

  <!-- Scène de victoire (après Quiz final réussi) -->
  @if (gameWon()) {
  <app-victory-screen />
  } @else if (gameStarted()) {
  <!-- Exploration de la Zone -->
  <app-zone-explorer />
  }
</div>
